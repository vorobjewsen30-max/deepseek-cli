deepseek-feedback = { workspace = true }
deepseek-login = { workspace = true }
deepseek-model-provider-info = { workspace = true }
deepseek-models-manager = { workspace = true }
deepseek-otel = { workspace = true }
deepseek-protocol = { workspace = true }
deepseek-response-debug-context = { workspace = true }
http = { workspace = true }
tokio = { workspace = true, features = ["sync", "time"] }
tracing = { workspace = true, features = ["log"] }

[dev-dependencies]
pretty_assertions = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt"] }
wiremock = { workspace = true }
