[package]
name = "deepseek-sandboxing"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
name = "deepseek_sandboxing"
path = "src/lib.rs"
doctest = false

[lints]
workspace = true

[dependencies]
deepseek-network-proxy = { workspace = true }
deepseek-protocol = { workspace = true }
deepseek-utils-absolute-path = { workspace = true }
deepseek-utils-path-uri = { workspace = true }
codex-windows-sandbox = { workspace = true }
dunce = { workspace = true }
libc = { workspace = true }
serde_json = { workspace = true }
regex-lite = { workspace = true }
tracing = { workspace = true, features = ["log"] }
url = { workspace = true }
which = { workspace = true }

[target.'cfg(windows)'.dependencies]
deepseek-utils-home-dir = { workspace = true }

[dev-dependencies]
anyhow = { workspace = true }
pretty_assertions = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt"] }
