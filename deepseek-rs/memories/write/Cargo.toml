[package]
edition.workspace = true
license.workspace = true
name = "deepseek-memories-write"
version.workspace = true

[lib]
name = "deepseek_memories_write"
path = "src/lib.rs"
doctest = false

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true }
chrono = { workspace = true }
deepseek-backend-client = { workspace = true }
deepseek-core = { workspace = true }
deepseek-config = { workspace = true }
deepseek-features = { workspace = true }
deepseek-git-utils = { workspace = true }
deepseek-login = { workspace = true }
deepseek-model-provider = { workspace = true }
deepseek-otel = { workspace = true }
deepseek-protocol = { workspace = true }
deepseek-rollout = { workspace = true }
deepseek-rollout-trace = { workspace = true }
deepseek-secrets = { workspace = true }
deepseek-state = { workspace = true }
deepseek-terminal-detection = { workspace = true }
deepseek-utils-absolute-path = { workspace = true }
deepseek-utils-output-truncation = { workspace = true }
deepseek-utils-template = { workspace = true }
futures = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["fs", "rt", "sync", "time"] }
tracing = { workspace = true, features = ["log"] }
uuid = { workspace = true, features = ["v4", "v5"] }

[dev-dependencies]
deepseek-model-provider-info = { workspace = true }
deepseek-models-manager = { workspace = true }
core_test_support = { workspace = true }
pretty_assertions = { workspace = true }
tempfile = { workspace = true }
