[package]
edition.workspace = true
license.workspace = true
name = "deepseek-memories-extension"
version.workspace = true

[lib]
name = "deepseek_memories_extension"
path = "src/lib.rs"
doctest = false

[lints]
workspace = true

[dependencies]
deepseek-core = { workspace = true }
deepseek-extension-api = { workspace = true }
deepseek-features = { workspace = true }
deepseek-otel = { workspace = true }
deepseek-tools = { workspace = true }
deepseek-utils-absolute-path = { workspace = true }
deepseek-utils-output-truncation = { workspace = true }
deepseek-utils-template = { workspace = true }
schemars = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["fs"] }

[dev-dependencies]
pretty_assertions = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["fs", "macros"] }
