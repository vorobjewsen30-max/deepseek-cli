deepseek-extension-api = { workspace = true }
deepseek-login = { workspace = true }
deepseek-model-provider = { workspace = true }
deepseek-model-provider-info = { workspace = true }
deepseek-protocol = { workspace = true }
deepseek-tools = { workspace = true }
deepseek-utils-absolute-path = { workspace = true }
deepseek-utils-image = { workspace = true }
deepseek-utils-path-uri = { workspace = true }
http = { workspace = true }
schemars = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
pretty_assertions = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt"] }
