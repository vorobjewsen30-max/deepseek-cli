license.workspace = true
name = "deepseek-image-generation-extension"
version.workspace = true

[lib]
name = "deepseek_image_generation_extension"
path = "src/lib.rs"
doctest = false

[lints]
workspace = true

[dependencies]
base64 = { workspace = true }
