[package]
edition.workspace = true
license.workspace = true
name = "deepseek-goal-extension"
version.workspace = true

[lib]
name = "deepseek_goal_extension"
path = "src/lib.rs"
test = false
doctest = false

[lints]
workspace = true

[dependencies]
deepseek-analytics = { workspace = true }
deepseek-core = { workspace = true }
deepseek-extension-api = { workspace = true }
deepseek-otel = { workspace = true }
deepseek-protocol = { workspace = true }
deepseek-state = { workspace = true }
deepseek-tools = { workspace = true }
deepseek-utils-template = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["sync"] }
tracing = { workspace = true }

[dev-dependencies]
anyhow = { workspace = true }
chrono = { workspace = true }
pretty_assertions = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
