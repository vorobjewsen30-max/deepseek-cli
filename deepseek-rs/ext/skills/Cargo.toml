[package]
edition.workspace = true
license.workspace = true
name = "deepseek-skills-extension"
version.workspace = true

[lib]
name = "deepseek_skills_extension"
path = "src/lib.rs"
test = false
doctest = false

[lints]
workspace = true

[dependencies]
deepseek-core-skills = { workspace = true }
deepseek-exec-server = { workspace = true }
deepseek-extension-api = { workspace = true }
deepseek-mcp = { workspace = true }
deepseek-protocol = { workspace = true }
deepseek-tools = { workspace = true }
deepseek-utils-path-uri = { workspace = true }
deepseek-utils-string = { workspace = true }
schemars = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["sync", "time"] }
tracing = { workspace = true }
url = { workspace = true }

[dev-dependencies]
deepseek-utils-absolute-path = { workspace = true }
pretty_assertions = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
