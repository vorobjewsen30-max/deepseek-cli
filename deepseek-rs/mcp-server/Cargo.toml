[package]
name = "deepseek-mcp-server"
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "deepseek-mcp-server"
path = "src/main.rs"

[lib]
name = "deepseek_mcp_server"
path = "src/lib.rs"
doctest = false

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true }
deepseek-arg0 = { workspace = true }
deepseek-config = { workspace = true }
deepseek-core = { workspace = true }
deepseek-home = { workspace = true }
deepseek-exec-server = { workspace = true }
deepseek-extension-api = { workspace = true }
deepseek-login = { workspace = true }
deepseek-protocol = { workspace = true }
deepseek-utils-cli = { workspace = true }
deepseek-utils-json-to-toml = { workspace = true }
rmcp = { workspace = true }
schemars = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
shlex = { workspace = true }
tokio = { workspace = true, features = [
    "io-std",
    "macros",
    "process",
    "rt-multi-thread",
    "signal",
] }
tracing = { workspace = true, features = ["log"] }
tracing-subscriber = { workspace = true, features = ["env-filter", "fmt"] }

[dev-dependencies]
deepseek-utils-absolute-path = { workspace = true }
deepseek-shell-command = { workspace = true }
core_test_support = { workspace = true }
mcp_test_support = { workspace = true }
os_info = { workspace = true }
pretty_assertions = { workspace = true }
tempfile = { workspace = true }
wiremock = { workspace = true }
